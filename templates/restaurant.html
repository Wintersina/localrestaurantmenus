{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="theme-color" content="#111111"/>
    {% if favicon %}
        <link rel="icon" type="image/x-icon" href="{% static favicon %}"/>
    {% else %}
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%8D%BD%EF%B8%8F</text></svg>"/>
    {% endif %}
    {% if apple_touch_icon %}
        <link rel="apple-touch-icon" href="{% static apple_touch_icon %}"/>
    {% endif %}
    <title>{{ name }} — Menu</title>
    <link rel="preload" as="image" href="{% static page_images.0 %}"/>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: #111;
            color: #eee;
            -webkit-text-size-adjust: 100%;
        }
        header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(17, 17, 17, 0.92);
            backdrop-filter: saturate(160%) blur(10px);
            -webkit-backdrop-filter: saturate(160%) blur(10px);
            padding: 0.85rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            border-bottom: 1px solid #222;
        }
        header h1 {
            font-size: 1rem;
            font-weight: 600;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pdf-link {
            font-size: 0.85rem;
            color: #111;
            background: #f5d061;
            padding: 0.5rem 0.85rem;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
            white-space: nowrap;
        }
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 0.5rem 0 2rem;
        }
        figure {
            margin: 0.5rem 0;
            background: #fff;
        }
        figure img {
            display: block;
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
<header>
    <h1>{{ name }}</h1>
    <a class="pdf-link" href="{% static pdf_path %}" download>PDF</a>
</header>
<main>
    {% for img in page_images %}
        <figure>
            <img src="{% static img %}"
                 alt="{{ name }} menu page {{ forloop.counter }}"
                 loading="{% if forloop.first %}eager{% else %}lazy{% endif %}"
                 decoding="async"/>
        </figure>
    {% endfor %}
</main>
</body>
</html>
